name: Auto-Generate Full ZIP Release

on:
  push:
    branches:
      - main  # התהליך ירוץ בכל פעם שתעלה שינויים לענף הראשי (Main)
  workflow_dispatch: # שמרתי את זה כדי שתוכל עדיין להפעיל ידנית אם תרצה

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true # מוודא שהקבצים הגדולים יורדים בשלמותם

      - name: Zip files
        run: zip -r Full-Repository-Download.zip . -x "*.git*" -x "*.github*"

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_ENV

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build # תג קבוע כדי לא להציף בעשרות Releases
          name: Full Download (Auto-Updated)
          files: Full-Repository-Download.zip
          body: |
            גרסה זו מתעדכנת אוטומטית בכל פעם שמועלה קוד חדש למאגר.
            ה-ZIP מכיל את קבצי ה-PDF והקבצים הגדולים (150MB+) בגרסתם המלאה.
          overwrite: true # מעדכן את הקובץ הקיים במקום ליצור Release חדש בכל פעם
