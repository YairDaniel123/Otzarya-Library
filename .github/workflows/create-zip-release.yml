name: Zero-Downtime Release with Cleanup

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true # מביא את הקבצים האמיתיים מ-LFS

      - name: Get timestamp
        id: vars
        run: echo "sha_short=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Zip files
        run: zip -r Full-Repository-Download.zip . -x "*.git*" -x "*.github*"

      - name: Create New Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rel-${{ env.sha_short }}
          name: "Library Update: ${{ env.sha_short }}"
          files: Full-Repository-Download.zip
          make_latest: true
          body: |
            גרסה זו מתעדכנת אוטומטית בכל פעם שמועלים ספרים חדשים למאגר.
            ה-ZIP מכיל את קבצי ה-PDF והקבצים הגדולים (150MB+) בגרסתם המלאה.
            
            ---
            *נוצר אוטומטית בתאריך: ${{ env.sha_short }}*

      - name: Cleanup Old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.0
        with:
          keep_latest: 2
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
